include:
  - artifact: os_detection_board_feature_disabled
    board: xiao_ble//zmk
    shield: tester_xiao

  - artifact: os_detection_board_with_rpc
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_OS_DETECTION=y -DCONFIG_ZMK_OS_DETECTION_STUDIO_RPC=y -DCONFIG_ZMK_OS_DETECTION_USB=y
    snippet: studio-rpc-usb-uart

  - artifact: os_detection_board_without_rpc
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: -DCONFIG_ZMK_OS_DETECTION=y -DCONFIG_ZMK_OS_DETECTION_USB=y

  - artifact: os_detection_custom_settings_board
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_OS_DETECTION=y -DCONFIG_ZMK_OS_DETECTION_STUDIO_RPC=y -DCONFIG_ZMK_OS_DETECTION_USB=y -DCONFIG_ZMK_CUSTOM_SETTINGS=y -DCONFIG_ZMK_CUSTOM_SETTINGS_STUDIO_RPC=y
    snippet: studio-rpc-usb-uart
